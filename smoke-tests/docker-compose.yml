# Mount layout mirrors the repo tree under /workspace/ so that relative paths
# already embedded in go.mod (../../prescient-sdk-ts/...), nuget.config, and
# pom.xml all resolve without modification.
#
# All non-JS language runtimes are jsii-based and spawn a `node` subprocess,
# so each image includes Node.js alongside its primary language toolchain.
#
# network_mode: host — Docker bridge routing is unavailable on this host;
# containers inherit the host network stack so pip/go/nuget/maven can reach
# the internet for dependency resolution.

services:
  js:
    image: node:22-alpine
    network_mode: host
    working_dir: /workspace/smoke-tests/js
    volumes:
      - ./js:/workspace/smoke-tests/js:ro
      - ../prescient-sdk-ts/dist:/workspace/prescient-sdk-ts/dist:ro
      - ../prescient-sdk-ts/node_modules:/workspace/prescient-sdk-ts/node_modules:ro
    command: node smoke.js

  python:
    build:
      context: docker
      dockerfile: Dockerfile.python
    network_mode: host
    working_dir: /workspace/smoke-tests/python
    volumes:
      - ./python:/workspace/smoke-tests/python:ro
      - ../prescient-sdk-ts/targets/python:/workspace/prescient-sdk-ts/targets/python:ro
    command:
      - sh
      - -c
      - >-
        python3 -m venv /tmp/venv
        && /tmp/venv/bin/pip install -q
        /workspace/prescient-sdk-ts/targets/python/prescient_sdk_sparkgeo-1.0.0-py3-none-any.whl
        && /tmp/venv/bin/python smoke.py

  go:
    build:
      context: docker
      dockerfile: Dockerfile.go
    network_mode: host
    working_dir: /workspace/smoke-tests/go
    volumes:
      # rw — go mod tidy writes go.sum on first run
      - ./go:/workspace/smoke-tests/go
      - ../prescient-sdk-ts/targets/go:/workspace/prescient-sdk-ts/targets/go:ro
      - go-mod-cache:/root/go/pkg/mod
    environment:
      GOPATH: /root/go
    command: sh -c "go mod tidy && go run ."

  dotnet:
    build:
      context: docker
      dockerfile: Dockerfile.dotnet
    network_mode: host
    working_dir: /workspace/smoke-tests/dotnet
    volumes:
      # rw — dotnet creates obj/ and bin/ in the project dir
      - ./dotnet:/workspace/smoke-tests/dotnet
      - ../prescient-sdk-ts/targets/dotnet:/workspace/prescient-sdk-ts/targets/dotnet:ro
      - nuget-cache:/root/.nuget
    command: dotnet run --project smoke.csproj

  java:
    build:
      context: docker
      dockerfile: Dockerfile.java
    network_mode: host
    working_dir: /workspace/smoke-tests/java
    volumes:
      # rw — maven writes target/ in the project dir
      - ./java:/workspace/smoke-tests/java
      - ../prescient-sdk-ts/targets/java:/workspace/prescient-sdk-ts/targets/java:ro
      - maven-cache:/root/.m2
    command: mvn -q compile exec:java

volumes:
  go-mod-cache:
  nuget-cache:
  maven-cache:
