name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

on:
  push:
    tags: ["*.*.*", "v*.*.*"]

env:
  TWINE_USERNAME: __token__
  TWINE_PASSWORD: ${{ secrets.PY_PI_API_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce tag/branch policy
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(a|b|rc)\.[0-9]+$ ]]; then
            echo "Pre-release tag '$TAG' — any branch is allowed."
          else
            if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
              echo "Final release tag '$TAG' is on main — proceeding."
            else
              echo "::error::Final release tag '$TAG' must be created from a commit on main. Use a pre-release suffix (a/b/rc, e.g. v1.2.3rc.1) to publish from non-main branches."
              exit 1
            fi
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "0.4.10"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --all-extras --dev

      # run tests and check formatting
      - name: run tests
        run: |
          uv run pytest tests/

      - name: check-format
        run: |
          uv run ruff check

      # build and publish
      - name: build project
        run: uv build

      - name: Publish to PyPI
        run: uvx twine upload dist/* --non-interactive
