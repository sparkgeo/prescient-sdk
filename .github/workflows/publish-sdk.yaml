name: Publish SDK to all registries

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: {}  # deny all; jobs declare only what they need

jobs:
  # ------------------------------------------------------------------
  # Build all language targets from the tagged commit.
  # Artifacts are shared with every publish-* job to avoid rebuilding.
  # ------------------------------------------------------------------
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    defaults:
      run:
        working-directory: prescient-sdk-ts

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: "11.5.0"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: prescient-sdk-ts/pnpm-lock.yaml

      # jsii-pacmak needs each target language's toolchain at package time.
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: "stable"

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: "8.x"

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: "temurin"
          java-version: "21"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm run build

      - run: pnpm test

      - run: pnpm run package

      # Fix #5: pinned SHA (was @v4)
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sdk-targets
          path: prescient-sdk-ts/targets/
          retention-days: 1

  # ------------------------------------------------------------------
  # npm  (pre-built tarball: targets/js/*.tgz, produced by jsii-pacmak)
  # Secret: NPM_TOKEN
  # ------------------------------------------------------------------
  publish-npm:
    name: Publish → npm
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    environment: npm-production

    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Fix #5: pinned SHA; Fix #1: download targets/ which includes the pre-built tgz
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: sdk-targets
          path: targets/

      # Fix #1: publish the pre-built tarball directly — dist/ is bundled inside it
      # by jsii-pacmak's npm pack step, so no source checkout or build needed here.
      - run: npm publish targets/js/*.tgz --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------------------
  # PyPI  (targets/python/ contains wheel + sdist from jsii-pacmak)
  # Secret: PYPI_JSII_API_TOKEN
  # PyPI project name: prescient-sdk-sparkgeo
  # ------------------------------------------------------------------
  publish-pypi:
    name: Publish → PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    environment: pypi-jsii-production

    steps:
      # Fix #5: pinned SHA
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: sdk-targets
          path: targets/

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - run: pip install twine

      # Fix #7: upload all dist files (wheel + sdist) not just *.whl
      - run: twine upload targets/python/* --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_JSII_API_TOKEN }}

  # ------------------------------------------------------------------
  # NuGet  (package: targets/dotnet/Sparkgeo.PrescientSdk.*.nupkg)
  # Secret: NUGET_API_KEY
  # ------------------------------------------------------------------
  publish-nuget:
    name: Publish → NuGet
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    environment: nuget-production

    steps:
      # Fix #5: pinned SHA
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: sdk-targets
          path: targets/

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: "8.x"

      # Fix #4: API key passed via env var, not interpolated into the command string
      - run: >-
          dotnet nuget push targets/dotnet/*.nupkg
          --api-key "${NUGET_API_KEY}"
          --source https://api.nuget.org/v3/index.json
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  # ------------------------------------------------------------------
  # Maven Central  (module: targets/java/, groupId com.sparkgeo)
  #
  # Uses publib (jsii-aware publish tool) which:
  #   - Navigates the local Maven repo layout jsii-pacmak produces
  #   - Injects <distributionManagement> pointing at OSSRH
  #   - GPG-signs all artifacts before staging
  #   - Promotes the staging repo to Central
  #
  # Prerequisites:
  #   - OSSRH account + namespace com.sparkgeo approved
  #   - GPG key uploaded to keyserver
  #   - MAVEN_STAGING_PROFILE_ID from OSSRH staging profile settings
  # Secrets: MAVEN_USERNAME, MAVEN_PASSWORD,
  #          MAVEN_GPG_PRIVATE_KEY, MAVEN_GPG_PASSPHRASE,
  #          MAVEN_STAGING_PROFILE_ID
  # ------------------------------------------------------------------
  publish-maven:
    name: Publish → Maven Central
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    environment: maven-production

    steps:
      # Fix #5: pinned SHA
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: sdk-targets
          path: targets/

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: "temurin"
          java-version: "21"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"

      # Fix #2 + #3: publib-maven handles the Maven local-repo layout from
      # jsii-pacmak, injects distributionManagement, runs GPG signing, and
      # promotes the OSSRH staging repo — replacing the broken `mvn deploy -f`
      # approach which pointed at a path that does not exist.
      - run: npm install -g publib@latest

      - run: publib-maven
        env:
          MAVEN_ENDPOINT: https://oss.sonatype.org
          MAVEN_DISTS_FOLDER: targets/java
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PRIVATE_KEY_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MAVEN_STAGING_PROFILE_ID: ${{ secrets.MAVEN_STAGING_PROFILE_ID }}

  # ------------------------------------------------------------------
  # Go  (module: github.com/sparkgeo/prescient-sdk-go/prescientsdk)
  # Prerequisites: sparkgeo/prescient-sdk-go repo must exist on GitHub.
  # The generated module lives under targets/go/prescientsdk/ and is
  # synced to the deploy repo, then tagged prescientsdk/vX.Y.Z so the
  # Go module proxy serves it at the correct import path.
  # Secret: GO_DEPLOY_TOKEN  (PAT with contents:write on prescient-sdk-go)
  # ------------------------------------------------------------------
  publish-go:
    name: Publish → Go module
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    environment: go-production

    steps:
      # Fix #5: pinned SHA
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: sdk-targets
          path: targets/

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: sparkgeo/prescient-sdk-go
          token: ${{ secrets.GO_DEPLOY_TOKEN }}
          path: prescient-sdk-go

      - name: Extract version
        id: ver
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Sync generated module into deploy repo
        run: rsync -a --delete targets/go/prescientsdk/ prescient-sdk-go/prescientsdk/

      - name: Commit, tag, and push
        env:
          SDK_TAG: ${{ steps.ver.outputs.tag }}
        run: |
          cd prescient-sdk-go
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "release ${SDK_TAG}"
          # Fix #6: skip if tag already exists on remote (idempotent re-runs)
          if git ls-remote --tags origin "prescientsdk/${SDK_TAG}" | grep -q .; then
            echo "Tag prescientsdk/${SDK_TAG} already exists on remote, skipping"
            exit 0
          fi
          # Go module proxy expects tag format: <subdir>/vX.Y.Z
          git tag "prescientsdk/${SDK_TAG}"
          git push origin HEAD "prescientsdk/${SDK_TAG}"
