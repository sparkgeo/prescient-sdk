name: Publish SDK to all registries

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: {}  # deny all; jobs declare only what they need

jobs:
  # ------------------------------------------------------------------
  # Build all language targets from the tagged commit.
  # Artifacts are shared with every publish-* job to avoid rebuilding.
  # ------------------------------------------------------------------
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    defaults:
      run:
        working-directory: prescient-sdk-ts

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: "11.5.0"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: prescient-sdk-ts/pnpm-lock.yaml

      # jsii-pacmak needs each target language's toolchain at package time.
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: "stable"

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: "8.x"

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: "temurin"
          java-version: "21"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm run build

      - run: pnpm test

      - run: pnpm run package

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-targets
          path: prescient-sdk-ts/targets/
          retention-days: 1

  # ------------------------------------------------------------------
  # npm  (package: targets/js/*.tgz, published from source tree)
  # Secret: NPM_TOKEN
  # ------------------------------------------------------------------
  publish-npm:
    name: Publish → npm
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    environment: npm-production
    defaults:
      run:
        working-directory: prescient-sdk-ts

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: "11.5.0"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: actions/download-artifact@v4
        with:
          name: sdk-targets
          path: prescient-sdk-ts/targets/

      # --no-git-checks: working directory has build output; dist/ is already
      # compiled by the build job (downloaded via artifact above).
      - run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------------------
  # PyPI  (wheel: targets/python/prescient_sdk_sparkgeo-*.whl)
  # Secret: PYPI_JSII_API_TOKEN
  # PyPI project name: prescient-sdk-sparkgeo
  # ------------------------------------------------------------------
  publish-pypi:
    name: Publish → PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    environment: pypi-jsii-production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-targets
          path: targets/

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - run: pip install twine

      - run: twine upload targets/python/*.whl --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_JSII_API_TOKEN }}

  # ------------------------------------------------------------------
  # NuGet  (package: targets/dotnet/Sparkgeo.PrescientSdk.*.nupkg)
  # Secret: NUGET_API_KEY
  # ------------------------------------------------------------------
  publish-nuget:
    name: Publish → NuGet
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    environment: nuget-production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-targets
          path: targets/

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: "8.x"

      - run: >-
          dotnet nuget push targets/dotnet/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json

  # ------------------------------------------------------------------
  # Maven Central  (module: targets/java/, groupId com.sparkgeo)
  # Prerequisites:
  #   - OSSRH account + namespace com.sparkgeo approved
  #   - GPG key uploaded to keyserver
  # Secrets: MAVEN_USERNAME, MAVEN_PASSWORD,
  #          MAVEN_GPG_PRIVATE_KEY, MAVEN_GPG_PASSPHRASE
  # ------------------------------------------------------------------
  publish-maven:
    name: Publish → Maven Central
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    environment: maven-production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-targets
          path: targets/

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: "temurin"
          java-version: "21"
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - run: >-
          mvn deploy -f targets/java/pom.xml
          --no-transfer-progress
          -Dgpg.passphrase="${MAVEN_GPG_PASSPHRASE}"
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  # ------------------------------------------------------------------
  # Go  (module: github.com/sparkgeo/prescient-sdk-go/prescientsdk)
  # Prerequisites: sparkgeo/prescient-sdk-go repo must exist on GitHub.
  # The generated module lives under targets/go/prescientsdk/ and is
  # synced to the deploy repo, then tagged prescientsdk/vX.Y.Z so the
  # Go module proxy serves it at the correct import path.
  # Secret: GO_DEPLOY_TOKEN  (PAT with contents:write on prescient-sdk-go)
  # ------------------------------------------------------------------
  publish-go:
    name: Publish → Go module
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    environment: go-production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-targets
          path: targets/

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: sparkgeo/prescient-sdk-go
          token: ${{ secrets.GO_DEPLOY_TOKEN }}
          path: prescient-sdk-go

      - name: Extract version
        id: ver
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Sync generated module into deploy repo
        run: rsync -a --delete targets/go/prescientsdk/ prescient-sdk-go/prescientsdk/

      - name: Commit, tag, and push
        env:
          SDK_TAG: ${{ steps.ver.outputs.tag }}
        run: |
          cd prescient-sdk-go
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "release ${SDK_TAG}"
          # Go module proxy expects tag format: <subdir>/vX.Y.Z
          git tag "prescientsdk/${SDK_TAG}"
          git push origin HEAD "prescientsdk/${SDK_TAG}"
