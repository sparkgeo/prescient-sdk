name: ci

on:
  push:
    branches:
    - main
  pull_request:
    types: [opened, reopened, synchronize]

permissions: {}  # deny all; jobs declare only what they need

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version:
        - "3.9"
        - "3.10"
        - "3.11"
        - "3.12"

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Install uv
      uses: astral-sh/setup-uv@6dfebec6ddbcd197e02256fbdf54deb334fb7f06  # v2
      with:
        version: "0.4.10"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install the project
      run: uv sync --all-extras --dev

    - name: run tests
      run: |
        uv run pytest tests/

    - name: check-format
      run: |
        uv run ruff check

  typescript-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    defaults:
      run:
        working-directory: prescient-sdk-ts

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
      with:
        version: "11.5.0"  # keep in sync with packageManager in prescient-sdk-ts/package.json

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: "22"
        cache: "pnpm"
        cache-dependency-path: prescient-sdk-ts/pnpm-lock.yaml  # relative to repo root, not working-directory

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version: "3.12"

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
      with:
        go-version: "stable"

    - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
      with:
        dotnet-version: "8.x"

    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
      with:
        distribution: "temurin"
        java-version: "21"

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --ignore-scripts

    - name: Build
      run: pnpm run build

    - name: Test
      run: pnpm test

    - name: Package
      run: pnpm run package
