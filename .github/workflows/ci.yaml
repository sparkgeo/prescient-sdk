name: ci

on:
  push:
    branches:
    - main
  pull_request:
    types: [opened, reopened, synchronize]

permissions: {}  # deny all; jobs declare only what they need

# This job installs dependencies, runs tests, and checks formatting
jobs:
  run-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    strategy:
      matrix:
        python-version:
        - "3.9"
        - "3.10"
        - "3.11"
        - "3.12"

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Install uv
      uses: astral-sh/setup-uv@6dfebec6ddbcd197e02256fbdf54deb334fb7f06  # v2
      with:
        version: "0.4.10"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install the project
      run: uv sync --all-extras --dev

    - name: run tests
      run: |
        uv run pytest tests/

    - name: check-format
      run: |
        uv run ruff check

  typescript-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: prescient-sdk-ts

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
      with:
        version: "11.1.2"

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: "22"
        cache: "pnpm"
        cache-dependency-path: prescient-sdk-ts/pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build
      run: pnpm run build

    - name: Test
      run: pnpm test
