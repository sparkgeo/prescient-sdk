name: deploy-book

# Run this when a new release tag is pushed
on:
  push:
    tags: ['*.*.*', 'v*.*.*']

# This job installs dependencies, builds the book, and pushes it to `gh-pages`
jobs:
  deploy-book:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Require tag on main
      run: |
        set -e
        if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
          echo "Tag '$GITHUB_REF_NAME' is on main — proceeding."
        else
          echo "::error::Tag '$GITHUB_REF_NAME' must be created from a commit on main to deploy the book."
          exit 1
        fi

    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        version: "0.4.10"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: "Set up Python"
      uses: actions/setup-python@v5
      with:
        python-version-file: ".python-version"

    - name: Install the project
      run: uv sync --all-extras --dev

    - name: cache executed notebooks
      uses: actions/cache@v3
      with:
        path: _build/.jupyter_cache
        key: jupyter-book-cache-${{ hashFiles('uv.lock') }}

    # Build the book
    - name: Build the book
      run: |
        uv run jupyter-book build docs/

    # Upload the book's HTML as an artifact
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: "docs/_build/html"

    # Deploy the book's HTML to GitHub Pages
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4